name: CI Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  bump-version:
    # Skip if the commit IS the version bump to avoid loops (though GITHUB_TOKEN prevents it anyway)
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.get_version.outputs.new_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Head
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump Version
        id: get_version
        working-directory: bili-ticker-buy-rust
        run: |
          # Calculate new version
          node scripts/bump-version.js
          
          # Read new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "Bumping to $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Commit and Tag
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore(release): bump version to v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          
          # Push
          git push origin main
          git push origin "v$NEW_VERSION"

  build-release:
    needs: bump-version
    if: needs.bump-version.outputs.new_version != ''
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-version.outputs.new_version }}

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        working-directory: bili-ticker-buy-rust
        run: npm install

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: bili-ticker-buy-rust
          tagName: v${{ needs.bump-version.outputs.new_version }}
          releaseName: 'v${{ needs.bump-version.outputs.new_version }}'
          releaseBody: 'Automated release v${{ needs.bump-version.outputs.new_version }}'
          releaseDraft: false
          prerelease: false
